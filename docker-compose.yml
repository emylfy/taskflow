services:
  app:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    # server.ts импортирует src/server/ws-handler через tsx — пробрасываем
    # исходник напрямую, чтобы обновления не требовали rebuild
    volumes:
      - ./src/server:/app/src/server:ro
    ports:
      - "3000:3000"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # ВНИМАНИЕ: 5432 НЕ публикуется в прод — добавьте port mapping
    # через docker-compose.override.yml при локальной разработке.
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on: [app, adminer]
    environment:
      # домен для автоматического выпуска TLS-сертификата (Let's Encrypt)
      APP_DOMAIN: ${APP_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

  # Adminer — веб-интерфейс к PostgreSQL для демонстрации схемы БД
  # комиссии. Закрыт Basic Auth в Caddy. На время защиты — оставить,
  # после защиты убрать командой `docker compose stop adminer && docker
  # compose rm -f adminer`.
  adminer:
    image: adminer:4
    depends_on: [db]
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: pepa-linha-dark
    restart: unless-stopped

volumes:
  pg-data:
  caddy-data:
  caddy-config:
