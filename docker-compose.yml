services:
  app:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    # server.ts импортирует src/server/ws-handler через tsx — пробрасываем
    # исходник напрямую, чтобы обновления не требовали rebuild
    volumes:
      - ./src/server:/app/src/server:ro
    ports:
      - "3000:3000"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # ВНИМАНИЕ: 5432 НЕ публикуется в прод — добавьте port mapping
    # через docker-compose.override.yml при локальной разработке.
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on: [app]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  pg-data:
  caddy-data:
  caddy-config:
